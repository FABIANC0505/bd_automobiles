{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">

    <!-- Header -->
    <div class="page-header">
      <h1><i class="bi bi-person-plus-fill me-2" style="color:var(--accent)"></i>Agregar Cliente</h1>
      <p>Completa el formulario para registrar un nuevo cliente</p>
    </div>

    <!-- Card formulario -->
    <div class="card-dark p-4">
      <form method="POST" autocomplete="off">

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="nif" name="nif"
                 placeholder="NIF" required>
          <label for="nif"><i class="bi bi-fingerprint me-1"></i>NIF</label>
        </div>

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="nombre" name="nombre"
                 placeholder="Nombre" required>
          <label for="nombre"><i class="bi bi-person me-1"></i>Nombre completo</label>
        </div>

        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="direccion" name="direccion"
                 placeholder="Dirección" required>
          <label for="direccion"><i class="bi bi-geo-alt me-1"></i>Dirección</label>
        </div>

        <div class="form-floating mb-4">
          <input type="tel" class="form-control" id="telefono" name="telefono"
                 placeholder="Teléfono" required>
          <label for="telefono"><i class="bi bi-telephone me-1"></i>Teléfono</label>
        </div>

        <div class="d-flex gap-3">
          <button type="submit" class="btn-accent d-inline-flex align-items-center gap-2">
            <i class="bi bi-check-lg"></i> Guardar Cliente
          </button>
          <a href="{{ url_for('index') }}" class="btn-outline-muted text-decoration-none d-inline-flex align-items-center gap-2">
            <i class="bi bi-x-lg"></i> Cancelar
          </a>
        </div>

      </form>
    </div>

  </div>
</div>

{% endblock %}
