{% extends "base.html" %} 
{% block content %} 

<a href="{{ url_for('add_clientes') }}" class="btn btn-primary mb-3">Agregar Cliente</a> 

<table class="table table-striped"> 
    <thead> 
        <tr> 
            <th>NIF</th> 
            <th>Nombre</th> 
            <th>Dirección</th> 
            <th>Teléfono</th> 
        </tr> 
    </thead> 
    <tbody> 
        {% for cliente in clientes %} 
        <tr> 
            <td>{{ cliente['nif'] }}</td> 
            <td>{{ cliente['nombre'] }}</td> 
            <td>{{ cliente['direccion'] }}</td> 
            <td>{{ cliente['telefono'] }}</td> 
            <td> 
                <a href="{{ url_for('edit_clientes', id=cliente['id']) }}" class="btn btn-warning">Editar</a> 

                <form action="{{ url_for('delete_clientes', id=cliente.id) }}" method="post" style="display:inline-block;"> 
                    <button type="submit" class="btn btn-danger">Eliminar</button> 
                </form>

            </td> 
        </tr> 
        {% else %}
        <tr>
            <td colspan="5">No hay clientes registrados</td>
        </tr>
        {% endfor %} 
    </tbody> 
</table> 

{% endblock %}
